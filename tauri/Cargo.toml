[package]
name = "compose-desktop"
version = "0.1.0"
description = "Compose local desktop runtime for autonomous agents"
authors = ["Compose"]
license = "MIT"
repository = ""
edition = "2021"
rust-version = "1.77.2"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-deep-link = "2"
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
futures = "0.3"
libp2p = { version = "0.54", features = ["tokio", "tcp", "dns", "noise", "yamux", "identify", "ping", "gossipsub", "macros"] }
tokio = { version = "1", features = ["sync", "time", "macros"] }

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
