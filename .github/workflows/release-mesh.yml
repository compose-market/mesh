name: Release Compose Mesh

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  resolve-version:
    name: Resolve Release Version
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      package_version: ${{ steps.version.outputs.package_version }}
      published_version: ${{ steps.version.outputs.published_version }}
      source: ${{ steps.version.outputs.source }}
      release_name: ${{ steps.version.outputs.release_name }}
      repository: ${{ steps.version.outputs.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 25.9.0
          package-manager-cache: false

      - name: Resolve progressive release version
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/versioning.mjs resolve-release

  create-release:
    name: Create Draft Release
    runs-on: ubuntu-22.04
    needs: resolve-version
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}

    steps:
      - name: Create or reuse draft release
        id: release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = `${{ needs.resolve-version.outputs.tag }}`;
            const releaseName = `${{ needs.resolve-version.outputs.release_name }}`;
            const versionSource = `${{ needs.resolve-version.outputs.source }}`;
            const packageVersion = `${{ needs.resolve-version.outputs.package_version }}`;
            const publishedVersion = `${{ needs.resolve-version.outputs.published_version }}`;
            const targetCommitish = context.sha;
            const bodyLines = [
              `${releaseName}`,
              "",
              `Automated release for ${targetCommitish}.`,
              `Version source: ${versionSource}.`,
              `package.json version: ${packageVersion}.`,
              `Highest published release before this run: ${publishedVersion || "none"}.`,
              "",
              `Commit: https://github.com/${owner}/${repo}/commit/${targetCommitish}`,
            ];
            const body = bodyLines.join("\n");

            let release;
            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              });
              release = existing.data;
              release = (await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: release.id,
                tag_name: tag,
                target_commitish: targetCommitish,
                name: releaseName,
                body,
                draft: true,
                prerelease: false,
              })).data;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              release = (await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                target_commitish: targetCommitish,
                name: releaseName,
                body,
                draft: true,
                prerelease: false,
              })).data;
            }

            core.setOutput("release_id", String(release.id));

  build:
    name: Build ${{ matrix.label }}
    needs:
      - resolve-version
      - create-release
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS Intel
            asset_pattern: intel[ext]
            bundle_args: --bundles app,dmg
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS Apple Silicon
            asset_pattern: apple-silicon[ext]
            bundle_args: --bundles app,dmg
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux
            asset_pattern: linux[ext]
            bundle_args: --bundles appimage,deb,rpm
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows
            asset_pattern: windows[ext]
            bundle_args: --bundles nsis

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 25.9.0
          cache: npm
          package-manager-cache: false

      - name: Update npm
        run: npm install -g npm@11.12.1

      - name: Install npm dependencies
        run: npm ci

      - name: Sync project version for release artifacts
        run: node scripts/tauri-cli.mjs sync-version

      - name: Build frontend
        run: npm run build

      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: node scripts/tauri-cli.mjs
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: ${{ needs.resolve-version.outputs.tag }}
          releaseName: ${{ needs.resolve-version.outputs.release_name }}
          releaseDraft: true
          prerelease: false
          assetNamePattern: ${{ matrix.asset_pattern }}
          args: --target ${{ matrix.target }} ${{ matrix.bundle_args }}

  build-android:
    name: Build Android APK
    needs:
      - resolve-version
      - create-release
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 25.9.0
          cache: npm
          package-manager-cache: false

      - name: Update npm
        run: npm install -g npm@11.12.1

      - name: Install npm dependencies
        run: npm ci

      - name: Sync project version for release artifacts
        run: node scripts/tauri-cli.mjs sync-version

      - name: Build frontend
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
          cache-dependency-path: |
            tauri/gen/android/**/*.gradle*
            tauri/gen/android/**/gradle-wrapper.properties

      - name: Configure Android SDK
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> "$GITHUB_ENV"
          echo "/usr/local/lib/android/sdk/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "/usr/local/lib/android/sdk/platform-tools" >> "$GITHUB_PATH"

      - name: Install Android packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "build-tools;36.0.0" "platforms;android-36" "ndk;28.0.13004108"
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/28.0.13004108" >> "$GITHUB_ENV"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/28.0.13004108" >> "$GITHUB_ENV"

      - name: Setup Android signing
        run: |
          cd tauri/gen/android
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > keystore.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties
          echo "storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}" >> keystore.properties
          base64 -d <<< "${{ secrets.ANDROID_KEY_BASE64 }}" > "$RUNNER_TEMP/compose-mesh-android-keystore.jks"
          echo "storeFile=$RUNNER_TEMP/compose-mesh-android-keystore.jks" >> keystore.properties

      - name: Build Android APK
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          NDK_HOME: ${{ env.NDK_HOME }}
        run: node scripts/tauri-cli.mjs android build --apk --ci

      - name: Resolve Android APK path
        id: android_apk
        run: |
          APK_PATH="$(find tauri/gen/android/app/build/outputs/apk -type f -name '*.apk' | sort | tail -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "Android APK not found after build." >&2
            exit 1
          fi
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload Android APK to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.resolve-version.outputs.tag }}" \
            "${{ steps.android_apk.outputs.path }}#android.apk" \
            --clobber \
            --repo "${{ github.repository }}"

  publish-release:
    name: Publish Release
    runs-on: ubuntu-22.04
    if: ${{ always() && needs.resolve-version.result == 'success' && needs.create-release.result == 'success' }}
    needs:
      - resolve-version
      - create-release
      - build
      - build-android
    steps:
      - name: Publish draft release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const releaseId = Number(`${{ needs.create-release.outputs.release_id }}`);
            const assets = await github.paginate(github.rest.repos.listReleaseAssets, {
              owner,
              repo,
              release_id: releaseId,
              per_page: 100,
            });

            if (assets.length === 0) {
              core.setFailed(`No release assets were uploaded for ${releaseId}; keeping release in draft.`);
              return;
            }

            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: releaseId,
              tag_name: `${{ needs.resolve-version.outputs.tag }}`,
              name: `${{ needs.resolve-version.outputs.release_name }}`,
              draft: false,
              prerelease: false,
            });
